# Project identity
sonar.projectKey=syntx-policycheck
sonar.projectName=Syntx Policy Checker
sonar.projectVersion=1.0

# Source roots
sonar.sources=.
sonar.exclusions=**/.backup/**,**/node_modules/**,**/*_test.go,**/*_mock.go,**/*.gen.go

# Go specific
sonar.go.coverage.reportPaths=coverage.out

# Rule suppressions
# S1135 = TODO/FIXME comments (Go suppression via NOSONAR is unreliable)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=squid:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=**/internal/policycheck/**

# Add further rules as e2, e3 etc:
# sonar.issue.ignore.multicriteria=e1,e2
# sonar.issue.ignore.multicriteria.e2.ruleKey=squid:SomeOtherRule
# sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.go